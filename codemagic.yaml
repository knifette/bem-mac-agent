workflows:
  mac-agent:
    name: BEM Mac Support Agent
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials      # shared from the iOS setup: ASC API key (.p8) + CERTIFICATE_PRIVATE_KEY
      vars:
        PYTHONUNBUFFERED: "1"
        BUNDLE_ID: "solutions.bem.support"
    scripts:
      - name: Install Python deps
        script: |
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Mac runtime self-test
        script: |
          source venv/bin/activate
          python agent.py --selftest
      - name: Build .app (PyInstaller)
        script: |
          source venv/bin/activate
          pyinstaller --noconfirm --windowed --name BEMSupport \
            --osx-bundle-identifier "$BUNDLE_ID" \
            --collect-all aiortc --collect-all av \
            --hidden-import mss --hidden-import websockets --hidden-import requests \
            --hidden-import rtc_sender --hidden-import pystray._darwin \
            agent.py
          ls -la dist/
      - name: Developer ID sign (cert auto-created via the ASC key — no Mac/CSR)
        script: |
          keychain initialize
          # create a Developer ID Application cert with the ASC key (or reuse an existing one)
          app-store-connect certificates create \
            --type DEVELOPER_ID_APPLICATION \
            --certificate-key="$CERTIFICATE_PRIVATE_KEY" --save \
          || app-store-connect list-certificates \
            --type DEVELOPER_ID_APPLICATION \
            --certificate-key="$CERTIFICATE_PRIVATE_KEY" --save
          keychain add-certificates
          CERT="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -1 | sed -E 's/.*\) ([A-F0-9]+) .*/\1/')"
          echo "signing identity: $CERT"
          codesign --deep --force --options runtime --timestamp --sign "$CERT" dist/BEMSupport.app
          codesign --verify --strict --verbose=2 dist/BEMSupport.app
      - name: Notarize + staple DMG
        script: |
          mkdir -p dmgroot && cp -R dist/BEMSupport.app dmgroot/
          hdiutil create -volname "BEM Support" -srcfolder dmgroot -ov -format UDZO BEMSupport.dmg
          app-store-connect notarize BEMSupport.dmg
          xcrun stapler staple BEMSupport.dmg || true
          ls -la BEMSupport.dmg
    artifacts:
      - BEMSupport.dmg
      - dist/BEMSupport.app
