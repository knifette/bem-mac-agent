workflows:
  mac-agent:
    name: BEM Mac Support Agent
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials      # shared from the iOS setup: ASC API key (.p8) + CERTIFICATE_PRIVATE_KEY
      vars:
        PYTHONUNBUFFERED: "1"
        BUNDLE_ID: "solutions.bem.support"
    scripts:
      - name: Install Python deps
        script: |
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Mac runtime self-test
        script: |
          source venv/bin/activate
          python agent.py --selftest
      - name: Build .app (PyInstaller)
        script: |
          source venv/bin/activate
          pyinstaller --noconfirm --windowed --name BEMSupport \
            --osx-bundle-identifier "$BUNDLE_ID" \
            --collect-all aiortc --collect-all av \
            --hidden-import mss --hidden-import websockets --hidden-import requests \
            --hidden-import rtc_sender --hidden-import pystray._darwin \
            agent.py
          ls -la dist/
      - name: Check signing creds reach this app
        script: |
          for v in APP_STORE_CONNECT_PRIVATE_KEY APP_STORE_CONNECT_KEY_IDENTIFIER APP_STORE_CONNECT_ISSUER_ID P12_PASS; do
            eval "val=\$$v"
            if [ -n "$val" ]; then echo "$v: SET (${#val} chars)"; else echo "$v: EMPTY"; fi
          done
      - name: Developer ID sign (cert auto-created via the ASC key — no Mac/CSR)
        script: |
          set -e
          keychain initialize
          echo "--- decrypt the committed Developer ID cert (AES-GCM; passphrase = P12_PASS env var) ---"
          source venv/bin/activate
          python decrypt_p12.py
          keychain add-certificates --certificate /tmp/devid.p12 --certificate-password "bempkcs12"
          echo "--- signing identities available ---"
          security find-identity -v -p codesigning
          CERT="$(security find-identity -v -p codesigning | grep 'Developer ID Application' | head -1 | sed -E 's/^[[:space:]]*[0-9]+\) ([0-9A-F]+) .*/\1/')"
          echo "chosen identity: [$CERT]"
          test -n "$CERT"     # FAIL loudly if no real Developer ID identity (no ad-hoc fallback)
          codesign --deep --force --options runtime --timestamp --sign "$CERT" dist/BEMSupport.app
          codesign --verify --strict --verbose=2 dist/BEMSupport.app
      - name: Notarize + staple DMG
        script: |
          set -e
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8
          mkdir -p dmgroot && cp -R dist/BEMSupport.app dmgroot/
          hdiutil create -volname "BEM Support" -srcfolder dmgroot -ov -format UDZO BEMSupport.dmg
          xcrun notarytool submit BEMSupport.dmg \
            --key /tmp/asc_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait
          xcrun stapler staple BEMSupport.dmg
          ls -la BEMSupport.dmg
    artifacts:
      - BEMSupport.dmg
      - dist/BEMSupport.app
