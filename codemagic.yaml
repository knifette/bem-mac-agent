workflows:
  mac-agent:
    name: BEM Mac Support Agent
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        PYTHONUNBUFFERED: "1"
    scripts:
      - name: Install Python deps
        script: |
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .app (PyInstaller, unsigned for now)
        script: |
          source venv/bin/activate
          pyinstaller --noconfirm --windowed --name BEMSupport \
            --collect-all aiortc --collect-all av \
            --hidden-import mss --hidden-import websockets --hidden-import requests \
            --hidden-import rtc_sender --hidden-import pystray._darwin \
            agent.py
          echo "--- built app ---"
          ls -la dist/
      - name: Package DMG (unsigned)
        script: |
          mkdir -p dmgroot && cp -R "dist/BEMSupport.app" dmgroot/
          hdiutil create -volname "BEM Support" -srcfolder dmgroot -ov -format UDZO BEMSupport-unsigned.dmg
          ls -la BEMSupport-unsigned.dmg
    artifacts:
      - BEMSupport-unsigned.dmg
      - dist/BEMSupport.app

